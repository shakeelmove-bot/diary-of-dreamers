<!DOCTYPE html>
<html>
<head>
  <title>Diary of a Dreamer</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(135deg,#ffe4ec,#ffd6e7,#ffc1dc);
      color: #8b3a62;
    }

    .header {
      text-align: center;
      padding: 50px 20px;
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    .subtitle {
      opacity: 0.7;
      font-style: italic;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      padding: 20px;
      margin: 15px 0;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>🎀 Diary of a Dreamer 🎀</h1>
  <p class="subtitle">Soft thoughts in a pink world</p>
</div>

<div class="container">

  <div class="card" onclick="openPoem('Silent Truth','We know the truth we never said...\nYou look away, but I still feel it.')">
    💗 Silent Truth
  </div>

  <div class="card" onclick="openPoem('Moon Reflection','The Moon shines brightest when it stands alone.')">
    🌙 Moon Reflection
  </div>

  <div class="card" onclick="openPoem('Ocean Heart','My thoughts are deep like oceans, quiet but endless.')">
    🌊 Ocean Heart
  </div>

  <div class="card" onclick="openPoem('Barbie Dream','Pink skies, soft hearts, and endless imagination.')">
    🎀 Barbie Dream
  </div>

</div>

<div class="popup" id="popup" onclick="closePoem()">
  <div class="popup-content" id="popupText"></div>
</div>

<script>
function openPoem(title, text) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupText").innerHTML =
    "<h2>" + title + "</h2><p style='white-space:pre-line'>" + text + "</p>";
}

function closePoem() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
